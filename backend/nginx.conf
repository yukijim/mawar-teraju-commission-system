# Nginx Reverse Proxy Configuration for Mawar Teraju Commission System
# Location: /etc/nginx/sites-available/mawar-teraju

server {
    listen 80;
    server_name commission.mawar-teraju.com;
    
    # Redirect HTTP traffic to HTTPS via Cloudflare/SSL
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name commission.mawar-teraju.com;

    # SSL certificates configurations managed by Cloudflare/Certbot
    ssl_certificate /etc/letsencrypt/live/commission.mawar-teraju.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/commission.mawar-teraju.com/privkey.pem;
    
    # Secure SSL parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # Limit client upload body sizes for Excel files
    client_max_body_size 50M;

    # Backend API requests reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        
        # Standard proxy headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Secure client headers for IP tracking and Cloudflare compatibility
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static UI Webapp routing
    location / {
        root /var/www/mawar-teraju-frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Enable Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
